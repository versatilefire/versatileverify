function addWOPhotos(event, woId) {
  const files = [...event.target.files];
  const container = document.getElementById('wo-completion-photos');
  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = e=>{
      woDetailPhotos.push(e.target.result);
      const img = document.createElement('img');
      img.className='completion-photo';
      img.src=e.target.result;
      img.onclick=()=>openPhoto(e.target.result);
      container.insertBefore(img, container.lastElementChild);
    };
    reader.readAsDataURL(file);
  });
}

async function completeWO(id) {
  const w = workOrders.find(x=>x.id===id);
  if(!w) return;
  const notes = document.getElementById('wo-completion-notes')?.value.trim()||'';
  const toEmail = 'versatilefireprotection@gmail.com';

  w.completionNotes = notes;
  w.completionPhotos = woDetailPhotos;
  w.completedAt = Date.now();
  w.completedBy = state.currentUser.name;
  saveAll();

  const statusEl = document.getElementById('wo-send-status');
  if(statusEl) { statusEl.className='send-status sending'; statusEl.textContent='⏳ Generating report and sending email…'; }

  try {
    await sendCompletionEmail(w, toEmail);
    if(statusEl) { statusEl.className='send-status sent'; statusEl.textContent='✓ Report sent to '+toEmail; }
    toast('Work order completed and report sent ✓');
    setTimeout(()=>{ closeModal('wo-detail-modal'); renderWOs(); }, 1500);
  } catch(err) {
    console.error(err);
    if(statusEl) { statusEl.className='send-status error'; statusEl.textContent='⚠ Email failed — work order still saved. Error: '+err.message; }
    renderWOs();
  }
}

async function sendCompletionEmail(w, toEmail) {
  emailjs.init(EMAILJS_KEY);

  // Build the report text
  const lines = [
    'WORK ORDER COMPLETION REPORT',
    '============================',
    '',
    `Task Number:    ${w.taskNumber||'—'}`,
    `Address:        ${w.address}${w.suburb?', '+w.suburb:''}`,
    `Property Type:  ${w.propertyType||'—'}`,
    `Techs Required: ${w.techs||'—'}`,
    `Est. Time:      ${w.estimatedTime||'—'}`,
    '',
    `Completed By:   ${w.completedBy}`,
    `Completed At:   ${new Date(w.completedAt).toLocaleString('en-AU')}`,
    '',
  ];
  if(w.accessNotes) lines.push(`Access Notes:   ${w.accessNotes}`, '');
  if((w.jobs||[]).length) {
    lines.push('SCOPE OF WORKS', '--------------');
    w.jobs.forEach(j=>lines.push('  • '+j));
    lines.push('');
  }
  if((w.parts||[]).length) {
    lines.push('PARTS REQUIRED', '--------------');
    w.parts.forEach(p=>lines.push('  • '+p));
    lines.push('');
  }
  const equipment = [w.scissorLift?'Scissor Lift':null, w.ladder10?'10ft Ladder':null, w.ladder12?'12ft Ladder':null].filter(Boolean);
  if(equipment.length) { lines.push('EQUIPMENT', '---------', ...equipment.map(e=>'  • '+e), ''); }
  if(w.notes) lines.push('ADMIN NOTES', '-----------', w.notes, '');
  lines.push('COMPLETION NOTES', '----------------', w.completionNotes||'(none)', '');
  lines.push(`Photos attached: ${(w.completionPhotos||[]).length}`);
  const reportText = lines.join('\n');

  // EmailJS can only send text — we send the report as the body
  // and note how many photos there are (base64 attachments are too large for EmailJS free tier)
  const templateParams = {
    to_email: toEmail,
    task_number: w.taskNumber||'Work Order',
    address: w.address+(w.suburb?', '+w.suburb:''),
    completed_by: w.completedBy,
    completed_date: new Date(w.completedAt).toLocaleString('en-AU'),
    notes: w.completionNotes||'(none)',
    report_text: reportText,
    photo_count: (w.completionPhotos||[]).length,
  };

  await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, templateParams);

  // Only download zip if admin, otherwise just email
  if((w.completionPhotos||[]).length > 0 && state.currentUser?.isAdmin) {
    await downloadCompletionZip(w, reportText);
  }
}

async function generateServiceReport(id) {
  const w = workOrders.find(x=>x.id===id);
  if(!w) return;

  // Gather current notes and photos from the open modal
  const notesEl = document.getElementById('wo-completion-notes');
  const notes = notesEl ? notesEl.value.trim() : (w.completionNotes||'');
  const photos = woDetailPhotos.length ? woDetailPhotos : (w.completionPhotos||[]);

  toast('Generating PDF…');

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
    const pageW = 210;
    const pageH = 297;
    const margin = 15;
    const contentW = pageW - margin*2;
    let y = margin;

    // Header background
    doc.setFillColor(15, 17, 23);
    doc.rect(0, 0, pageW, 38, 'F');

    // Logo text
    doc.setFont('helvetica','bold');
    doc.setFontSize(20);
    doc.setTextColor(240, 242, 248);
    doc.text('VERIFY', margin, 18);
    doc.setFontSize(9);
    doc.setFont('helvetica','normal');
    doc.setTextColor(139, 146, 168);
    doc.text('by VERSATILE', margin, 24);

    // Service Report title
    doc.setFont('helvetica','bold');
    doc.setFontSize(13);
    doc.setTextColor(240, 242, 248);
    doc.text('SERVICE REPORT', pageW - margin, 18, {align:'right'});

    // Date
    doc.setFont('helvetica','normal');
    doc.setFontSize(8);
    doc.setTextColor(139, 146, 168);
    const dateStr = w.completedAt
      ? new Date(w.completedAt).toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'})
      : new Date().toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'});
    doc.text(dateStr, pageW - margin, 25, {align:'right'});

    y = 48;

    // Job info card
    const drawCard = (title, rows, startY) => {
      let cardY = startY;
      doc.setFillColor(26, 31, 46);
      const rowH = 7;
      const cardH = 8 + rows.length * rowH;
      doc.roundedRect(margin, cardY, contentW, cardH, 2, 2, 'F');
      doc.setFont('helvetica','bold');
      doc.setFontSize(8);
      doc.setTextColor(85, 93, 117);
      doc.text(title.toUpperCase(), margin+4, cardY+6);
      rows.forEach((row, i) => {
        const rowY = cardY + 10 + i * rowH;
        doc.setFont('helvetica','bold');
        doc.setFontSize(8);
        doc.setTextColor(139, 146, 168);
        doc.text(row[0]+':', margin+4, rowY);
        doc.setFont('helvetica','normal');
        doc.setTextColor(240, 242, 248);
        doc.text(String(row[1]||'—'), margin+45, rowY);
      });
      return cardY + cardH + 4;
    };

    const jobRows = [
      ['Task #', w.taskNumber||'—'],
      ['Address', (w.address||'')+(w.suburb?', '+w.suburb:'')],
      ['Property Type', w.propertyType||'—'],
      ['Est. Time', w.estimatedTime||'—'],
    ];
    if(w.completedBy) jobRows.push(['Completed By', w.completedBy]);
    if(w.completedAt) jobRows.push(['Completed', new Date(w.completedAt).toLocaleString('en-AU')]);
    y = drawCard('Job Details', jobRows, y);

    // Equipment
    const equipment = [w.scissorLift?'Scissor Lift':null, w.ladder10?'10ft Ladder':null, w.ladder12?'12ft Ladder':null].filter(Boolean);
    if(equipment.length) {
      y = drawCard('Equipment Required', equipment.map(e=>[e,'']), y);
    }

    // Scope of works
    if((w.jobs||[]).length) {
      const jobsRows = w.jobs.map((j,i)=>[(i+1)+'.',j]);
      y = drawCard('Scope of Works', jobsRows, y);
    }

    // Parts
    if((w.parts||[]).length) {
      y = drawCard('Parts', w.parts.map(p=>['',p]), y);
    }

    // Access notes
    if(w.accessNotes) {
      y = drawCard('Access Notes', [['',w.accessNotes]], y);
    }

    // Completion notes
    if(notes) {
      // Wrap long notes text
      doc.setFillColor(26, 31, 46);
      doc.roundedRect(margin, y, contentW, 8, 2, 2, 'F');
      doc.setFont('helvetica','bold');
      doc.setFontSize(8);
      doc.setTextColor(85, 93, 117);
      doc.text('COMPLETION NOTES', margin+4, y+6);
      y += 10;

      doc.setFillColor(24, 28, 38);
      const splitNotes = doc.splitTextToSize(notes, contentW-8);
      const notesH = Math.max(10, splitNotes.length * 5 + 6);
      doc.roundedRect(margin, y, contentW, notesH, 2, 2, 'F');
      doc.setFont('helvetica','normal');
      doc.setFontSize(9);
      doc.setTextColor(240, 242, 248);
      doc.text(splitNotes, margin+4, y+6);
      y += notesH + 4;
    }

    // Photos
    if(photos.length) {
      if(y + 10 > pageH - margin) { doc.addPage(); y = margin; }

      doc.setFillColor(26, 31, 46);
      doc.roundedRect(margin, y, contentW, 8, 2, 2, 'F');
      doc.setFont('helvetica','bold');
      doc.setFontSize(8);
      doc.setTextColor(85, 93, 117);
      doc.text('PHOTOS ('+photos.length+')', margin+4, y+6);
      y += 12;

      const photoW = (contentW - 4) / 2;
      const photoH = photoW * 0.65;

      for(let i=0; i<photos.length; i++) {
        const col = i%2;
        const x = margin + col*(photoW+4);
        if(col===0 && i>0) y += photoH + 4;
        if(y + photoH > pageH - margin) { doc.addPage(); y = margin; }
        try {
          const fmt = photos[i].startsWith('data:image/png') ? 'PNG' : 'JPEG';
          doc.addImage(photos[i], fmt, x, y, photoW, photoH, undefined, 'MEDIUM');
        } catch(e) {}
      }
      y += photoH + 4;
    }

    // Footer
    doc.setFontSize(7);
    doc.setTextColor(85, 93, 117);
    doc.text('Generated by Verify by Versatile Fire Protection', pageW/2, pageH-8, {align:'center'});

    // Open PDF in new tab (works with GitHub Pages CSP)
    const filename = (w.taskNumber||'WO')+'_Service_Report.pdf';
    const pdfData = doc.output('datauristring');
    const newTab = window.open();
    if(newTab) {
      newTab.document.write('<iframe width="100%" height="100%" src="'+pdfData+'"></iframe>');
      toast('Service report opened ✓');
    } else {
      // Fallback — try save anyway
      doc.save(filename);
      toast('Service report downloaded ✓');
    }
  } catch(e) {
    console.error(e);
    toast('PDF failed: '+e.message);
  }
}

async function downloadCompletionZip(w, reportText) {
  const zip = new JSZip();
  const folderName = `${w.taskNumber||'WO'} — ${w.address}${w.suburb?' '+w.suburb:''}`.replace(/[/\\:*?"<>|]/g,'-');
  const folder = zip.folder(folderName);
  folder.file('completion-report.txt', reportText);
  (w.completionPhotos||[]).forEach((dataUrl, i)=>{
    const ext = dataUrl.startsWith('data:image/png')?'png':dataUrl.startsWith('data:image/gif')?'gif':'jpg';
    const base64 = dataUrl.split(',')[1];
    folder.file(`photo-${i+1}.${ext}`, base64, {base64:true});
  });
  const blob = await zip.generateAsync({type:'blob'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = folderName+'.zip';
  document.body.appendChild(link);
  link.click();
  setTimeout(()=>document.body.removeChild(link), 1000);
}

          <div class="fl ff"><label>Current Password</label><input type="password" id="cp-current" placeholder="Enter current password" autocomplete="current-password"></div>
          <div class="fl ff"><label>New Password</label><input type="password" id="cp-new" placeholder="Enter new password" autocomplete="new-password"></div>
          <div class="fl ff"><label>Confirm New Password</label><input type="password" id="cp-confirm" placeholder="Confirm new password" autocomplete="new-password"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('change-pw-modal')">Cancel</button>
        <button class="btn btn-primary" style="flex:1" onclick="saveChangePassword()">Save Password</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function saveChangePassword() {
  const current = document.getElementById('cp-current').value;
  const newPw = document.getElementById('cp-new').value.trim();
  const confirm = document.getElementById('cp-confirm').value.trim();
  const u = state.currentUser;
  if(!u) return;
  if(current !== u.password) { toast('Current password is incorrect'); return; }
  if(!newPw) { toast('New password cannot be empty'); return; }
  if(newPw !== confirm) { toast('Passwords do not match'); return; }
  u.password = newPw;
  state.currentUser = u;
  save('vv_session', u.id);
  db.ref('users/'+u.id).set(u);
  // update in USERS array too
  const idx = USERS.findIndex(x=>x.id===u.id);
  if(idx>=0) USERS[idx] = u;
  closeModal('change-pw-modal');
  toast('Password updated ✓');
}


function refreshCurrentScreen() {
  const name = state.currentScreen;
  if(name==='home') renderProperties();
  else if(name==='workorders') renderWOs();
  else if(name==='reports') renderReports();
  else if(name==='settings') renderSettings();
  else if(name==='users') renderUsers();
  else if(name==='dashboard') renderDashboard();
  else if(name==='map') refreshMap();
  toast('Refreshed');
}


function renderUsers() {

  if(!list) return;

function saveNewUser() {
  const name = document.getElementById('u-name').value.trim();
  const username = document.getElementById('u-username').value.trim().toLowerCase();
  const password = document.getElementById('u-password').value.trim();
  const role = document.getElementById('u-role').value;
  if(!name) { toast('Name is required'); return; }
  if(!username) { toast('Username is required'); return; }
  if(!password) { toast('Password is required'); return; }
  if(USERS.find(u=>u.username.toLowerCase()===username)) { toast('Username already taken'); return; }
  const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const newUser = {
    id: 'u'+Date.now(),
    name, username, password,
    role, initials,
    isAdmin: role==='admin',
    createdAt: Date.now(),
  };
  USERS.push(newUser);
  db.ref('users/'+newUser.id).set(newUser);
  closeModal('user-modal');
  renderUsers();
  toast('User created ✓');
}

function showEditUser(id) {
  const u = USERS.find(x=>x.id===id);
  if(!u) return;
  const html = `<div class="modal-overlay open" id="user-modal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <button class="btn-icon" onclick="closeModal('user-modal')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg></button>
        <span class="modal-title">Edit User</span>
      </div>
      <div class="modal-body">
        <div style="display:flex;flex-direction:column;gap:10px;">
          <div class="fg">
            <div class="fl"><label>Full Name</label><input type="text" id="u-name" value="${esc(u.name)}"></div>
            <div class="fl"><label>Username</label><input type="text" id="u-username" value="${esc(u.username)}" ${u.id==='admin'?'readonly':''}></div>
          </div>
          <div class="fl ff"><label>New Password <span style="font-size:10px;color:var(--text3);">(leave blank to keep current)</span></label><input type="password" id="u-password" placeholder="Leave blank to keep current" autocomplete="new-password"></div>
          <div class="fl ff"><label>Role</label>
            <select id="u-role" ${u.id==='admin'?'disabled':''}>
              <option value="tech" ${u.role==='tech'?'selected':''}>Technician</option>
              <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        ${u.id!=='admin'?`<button class="btn btn-danger" onclick="deleteUser('${u.id}')">Delete</button>`:''}
        <button class="btn btn-primary" style="flex:1" onclick="saveEditUser('${u.id}')">Save</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function saveEditUser(id) {
  const u = USERS.find(x=>x.id===id);
  if(!u) return;
  const name = document.getElementById('u-name').value.trim()||u.name;
  const username = document.getElementById('u-username').value.trim().toLowerCase()||u.username;
  const password = document.getElementById('u-password').value.trim();
  const role = document.getElementById('u-role').value||u.role;
  if(username!==u.username && USERS.find(x=>x.username.toLowerCase()===username && x.id!==id)) { toast('Username already taken'); return; }
  u.name = name;
  u.username = username;
  if(password) u.password = password;
  u.role = role;
  u.isAdmin = role==='admin';
  u.initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  db.ref('users/'+id).set(u);
  // update session if editing self
  if(state.currentUser?.id===id) {
    state.currentUser = u;
    save('vv_session', u.id);
  }
  closeModal('user-modal');
  renderUsers();
  toast('User updated ✓');
}

function deleteUser(id) {
  if(id==='admin') { toast('Cannot delete admin'); return; }
  if(state.currentUser?.id===id) { toast('Cannot delete yourself'); return; }
  USERS = USERS.filter(u=>u.id!==id);
  db.ref('users/'+id).remove();
  closeModal('user-modal');
  renderUsers();
  toast('User deleted');
}

async function geocodeAddress(address, suburb) {
  const key = address.toLowerCase().trim();
  if(geocodeCache[key]) return geocodeCache[key];

  // Direct suburb lookup first
  const suburbKey = (suburb||'').toLowerCase().trim().replace(/\s+/g,' ');
  if(suburbKey && SUBURB_COORDS[suburbKey]) {
    const result = {lat:SUBURB_COORDS[suburbKey][0], lng:SUBURB_COORDS[suburbKey][1]};
    geocodeCache[key] = result;
    return result;
  }

  // Nominatim fallback
  try {
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 6000);
    const q = encodeURIComponent(address+', NSW, Australia');
    const res = await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+q+'&limit=1', {signal:controller.signal});
    clearTimeout(timeout);
    const data = await res.json();
    if(data&&data[0]) {
      const result={lat:parseFloat(data[0].lat),lng:parseFloat(data[0].lon)};
      geocodeCache[key]=result;
      return result;
    }
  } catch(e){ console.warn('Geocode failed:', address); }
  return null;
}

async function renderMap() {
  const u = state.currentUser;
  if(u) { const el = document.getElementById('map-topbar-avatar'); if(el) el.textContent = u.initials; }
  buildBottomNav('map-bottomnav','map');

  const loading = document.getElementById('map-loading');
  const statusEl = document.getElementById('map-status');
  if(loading) loading.style.display='flex';

  await new Promise(r=>setTimeout(r, 100));

  if(typeof L === 'undefined') {
    if(loading) loading.style.display='none';
    document.getElementById('wo-map').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:8px;color:var(--text2);font-size:14px;"><div>⚠️ Map library failed to load</div><div style="font-size:12px;color:var(--text3);">Check your internet connection</div></div>';
    return;
  }

  try {
    if(!woMap) {
      woMap = L.map('wo-map', {zoomControl: true}).setView([-33.8688, 151.2093], 11);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19,
      }).addTo(woMap);
    } else {
      woMap.eachLayer(layer => { if(layer instanceof L.Marker) woMap.removeLayer(layer); });
      woMap.invalidateSize();
    }
  } catch(err) {
    if(loading) loading.style.display='none';
    document.getElementById('wo-map').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:8px;color:var(--text2);font-size:14px;padding:2rem;text-align:center;"><div>⚠️ Map error: '+err.message+'</div></div>';
    return;
  }

  const isAdmin = u?.isAdmin;
  const myWOs = workOrders.filter(w => {
    if(!isAdmin) {
      const assigned = w.assignees||[];
      if(assigned.length > 0 && !assigned.includes(u.id)) return false;
    }
    return !w.completedAt;
  });

  if(!myWOs.length) {
    if(loading) loading.style.display='none';
    woMap.invalidateSize();
    toast('No open jobs to map');
    return;
  }

  // Pin each job by full address
  let placed = 0;
  const bounds = [];

  for(const w of myWOs) {
    const fullAddr = (w.address||'')+(w.suburb?', '+w.suburb:'');
    if(!fullAddr.trim()) continue;
    if(statusEl) statusEl.textContent = 'Locating '+fullAddr+'...';
    const addrKey = fullAddr.toLowerCase().trim();
    const isCached = !!geocodeCache[addrKey];
    const coords = await geocodeAddress(fullAddr, w.suburb);
    if(coords) {
      bounds.push([coords.lat, coords.lng]);
      const isInProgress = w.status==='inprogress';
      const color = isInProgress ? '#f59e0b' : '#3b6ff5';
      const icon = L.divIcon({
        className: '',
        html: '<div style="width:14px;height:14px;border-radius:50%;background:'+color+';border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.5);"></div>',
        iconSize: [14,14], iconAnchor: [7,7], popupAnchor: [0,-10],
      });
      const assignedNames = (w.assignees||[]).map(id=>USERS.find(u=>u.id===id)?.name).filter(Boolean).join(', ');
      const popupContent = [
        '<div style="font-family:-apple-system,sans-serif;min-width:180px;">',
        w.taskNumber?'<div style="font-size:11px;font-family:monospace;color:#3b6ff5;font-weight:600;">'+esc(w.taskNumber)+'</div>':'',
        '<div style="font-size:13px;font-weight:600;margin:2px 0;">'+esc(w.address)+'</div>',
        w.suburb?'<div style="font-size:12px;color:#888;">'+esc(w.suburb)+'</div>':'',
        isInProgress?'<div style="font-size:11px;color:#f59e0b;">In Progress</div>':'<div style="font-size:11px;color:#888;">Pending</div>',
        assignedNames?'<div style="font-size:11px;color:#888;">'+esc(assignedNames)+'</div>':'',
        '<button onclick="closeAllPopups();openWODetail(\''+w.id+'\')" style="margin-top:8px;width:100%;padding:6px;background:#3b6ff5;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;">View Job</button>',
        '</div>',
      ].join('');
      L.marker([coords.lat, coords.lng], {icon}).addTo(woMap).bindPopup(popupContent, {maxWidth:220});
      placed++;
    }
    if(!isCached) await new Promise(r=>setTimeout(r, 1100));
  }

  if(loading) loading.style.display='none';
  woMap.invalidateSize();
  if(bounds.length) woMap.fitBounds(bounds, {padding:[40,40]});
  toast(placed+' job'+(placed!==1?'s':'')+' mapped');
}

function closeAllPopups() {
  if(woMap) woMap.closePopup();
}

function refreshMap() {
  geocodeCache = {};
  if(woMap) { woMap.eachLayer(layer=>{ if(layer instanceof L.Marker) woMap.removeLayer(layer); }); }
  renderMap();
}
